<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidFlow - Custom Client</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-surface: #1f1f1f;
            --bg-input: #2a2a2a;
            --text-main: #f1f1f1;
            --text-sub: #aaa;
            --accent: #3ea6ff;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Top Header Bar */
        header {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2d2d2d;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent);
        }

        .search-container {
            display: flex;
            width: 40%;
            max-width: 600px;
        }

        .search-container input {
            flex: 1;
            background-color: var(--bg-input);
            border: 1px solid #3c3c3c;
            padding: 10px 16px;
            border-radius: 40px 0 0 40px;
            color: white;
            font-size: 0.95rem;
            outline: none;
        }

        .search-container input:focus {
            border-color: var(--accent);
        }

        .search-container button {
            background-color: #303030;
            border: 1px solid #3c3c3c;
            border-left: none;
            padding: 0 20px;
            border-radius: 0 40px 40px 0;
            color: white;
            cursor: pointer;
        }

        .search-container button:hover {
            background-color: #404040;
        }

        /* Main Workspace Grid */
        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 1000px) {
            .workspace {
                grid-template-columns: 1fr 400px; /* Video left, sidebar right */
            }
        }

        /* Left Side: Video Section */
        .video-stage {
            display: flex;
            flex-direction: column;
        }

        .frame-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .frame-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .video-meta {
            margin-top: 16px;
        }

        .video-meta h1 {
            font-size: 1.3rem;
            margin: 0 0 8px 0;
            line-height: 1.4;
        }

        .video-meta p {
            margin: 0;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* Right Side: Sidebar Recommendations */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar h2 {
            font-size: 1.1rem;
            margin: 0;
            color: var(--text-main);
        }

        .rec-item {
            display: flex;
            gap: 12px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            border-radius: 8px;
            padding: 4px;
            transition: background 0.2s;
        }

        .rec-item:hover {
            background-color: var(--bg-surface);
        }

        .thumb-box {
            position: relative;
            flex-shrink: 0;
            width: 160px;
            height: 90px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #222;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rec-details {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .rec-details h3 {
            font-size: 0.9rem;
            margin: 0 0 6px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .rec-details p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">▶ VidFlow</div>
        <div class="search-container">
            <input type="text" id="targetUrl" placeholder="Enter YouTube link or Video ID...">
            <button onclick="processInput()">Load</button>
        </div>
        <div style="width: 80px;"></div>
    </header>

    <main class="workspace">
        <section class="video-stage">
            <div class="frame-wrapper" id="stageFrame">
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:var(--text-sub);">
                    Paste a link in the top bar to initialize pipeline.
                </div>
            </div>
            <div class="video-meta">
                <h1 id="stageTitle">No Video Loaded</h1>
                <p id="stageAuthor"></p>
            </div>
        </section>

        <aside class="sidebar">
            <h2>Related Content</h2>
            <div id="sidebarFeed" class="sidebar-feed"></div>
        </aside>
    </main>

<script>
    function parseId(input) {
        const regex = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = input.match(regex);
        return (match && match[2].length === 11) ? match[2] : input;
    }

    function processInput() {
        const query = document.getElementById('targetUrl').value.trim();
        const extractedId = parseId(query);
        if (extractedId) {
            streamVideo(extractedId);
        }
    }

    async function streamVideo(id) {
        // Load the main embed window cleanly - YouTube only
        const stage = document.getElementById('stageFrame');
        stage.innerHTML = `
            <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>`;

        document.getElementById('stageTitle').innerText = "Video ID: " + id;
        document.getElementById('stageAuthor').innerText = "Playing via YouTube";

        // Clear recommendations since we have no API access
        const feed = document.getElementById('sidebarFeed');
        feed.innerHTML = '<p style="color: var(--text-sub); font-size: 0.9rem;">Recommendations require API access (unavailable)</p>';
    }

    // Capture "Enter" key on search element
    document.getElementById('targetUrl').addEventListener('keypress', function (event) {
        if (event.key === 'Enter') {
            processInput();
        }
    });

    // Default target initialization on first load
    streamVideo("dQw4w9WgXcQ");
</script>

</body>
</html>
