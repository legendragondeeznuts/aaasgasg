<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f0f0f;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .search-box {
            max-width: 800px;
            margin: 0 auto 20px auto;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #3c3c3c;
            background: #121212;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 12px 24px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        .player-container {
            max-width: 1200px;
            margin: 20px auto;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="videoUrl" placeholder="Paste YouTube link or Video ID here...">
        <button onclick="loadVideo()">Load</button>
    </div>

    <div class="player-container" id="player">
        <div class="placeholder">Paste a YouTube link above</div>
    </div>

<script>
    function getVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : url;
    }

    function loadVideo() {
        const input = document.getElementById('videoUrl').value.trim();
        const videoId = getVideoId(input);
        
        if (videoId && videoId.length === 11) {
            const player = document.getElementById('player');
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
        }
    }

    document.getElementById('videoUrl').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') loadVideo();
    });

    loadVideo();
    document.getElementById('videoUrl').value = 'dQw4w9WgXcQ';
</script>

</body>
</html>
